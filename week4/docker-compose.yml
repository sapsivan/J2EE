version: '3.8'

services:

  postgres-order:
    image: postgres:16
    container_name: postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  postgres-inventory:
    image: postgres:16
    container_name: postgres-inventory
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - postgres-inventory
    ports:
      - "8082:8082"

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - postgres-order
      - inventory-service
    ports:
      - "8081:8081"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - order-service
      - inventory-service
    ports:
      - "8080:8080"